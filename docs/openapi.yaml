          example: external-system
        instanceId:
          type: string
          description: Unique identifier for the consuming instance
          example: instance-1
        leaseDurationSeconds:
          type: integer
          description: Lease duration in seconds (default 300, max 3600, min 30)
          minimum: 30
          maximum: 3600
          default: 300
