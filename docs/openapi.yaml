openapi: 3.1.0
info:
  title: Fulcrum Core API
  description: A comprehensive cloud infrastructure management system designed to orchestrate and monitor distributed cloud resources across multiple providers.
  version: 1.0.0
  contact:
    name: Fulcrum Project
    url: https://fulcrumproject.org
  license:
    name: Apache License 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: https://api.fulcrum.testudosrl.dev/api/v1
    description: Development server
security:
  - BearerAuth: []
tags:
  - name: Participants
    description: Cloud service participant management
  - name: Agents
    description: Agent and agent type management
  - name: Services
    description: Service, service type, service group management and service pools
  - name: Jobs
    description: Job queue and processing
  - name: Keycloak Users
    description: Keycloak user management
  - name: Metrics
    description: Metrics collection and management
  - name: Event
    description: Event logging
  - name: Tokens
    description: Authentication token management
  - name: Vault
    description: Secure secret storage and retrieval
paths:
  /agent-types:
    get:
      operationId: agentTypesList
      summary: List agent types
      tags:
        - Agents
      description: Retrieves a paginated list of agent types
      x-auth-permissions:
        - role: admin
          permission: all agent types
        - role: participant
          permission: all agent types
        - role: agent
          permission: all agent types
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          schema:
            type: string
          description: 'Sort field. Prefix with ''+'' for ascending or ''-'' for descending. Default is ascending. Supported fields: name'
          example: +name
        - name: name
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by agent type name (can specify multiple values)
      responses:
        '200':
          description: A paginated list of agent types
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageRes'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/AgentTypeRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: agentTypesCreate
      summary: Create an agent type
      tags:
        - Agents
      description: Creates a new agent type with optional service types
      x-auth-permissions:
        - role: admin
          permission: all agent types
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentTypeReq'
      responses:
        '201':
          description: Agent type created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTypeRes'
        '400':
          description: Invalid request body or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: Administrator access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '409':
          description: Agent type with same name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /agent-types/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/properties.UUID'
    get:
      operationId: agentTypesGet
      summary: Get an agent type
      tags:
        - Agents
      description: Retrieves a specific agent type by ID
      x-auth-permissions:
        - role: admin
          permission: all agent types
        - role: participant
          permission: all agent types
        - role: agent
          permission: all agent types
      responses:
        '200':
          description: The agent type details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTypeRes'
        '404':
          description: Agent type not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
    patch:
      operationId: agentTypesUpdate
      summary: Update an agent type
      tags:
        - Agents
      description: Partially updates an agent type (PATCH semantics)
      x-auth-permissions:
        - role: admin
          permission: all agent types
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentTypeReq'
      responses:
        '200':
          description: Agent type updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTypeRes'
        '400':
          description: Invalid request body or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: Administrator access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '404':
          description: Agent type not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '409':
          description: Agent type with same name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
    delete:
      operationId: agentTypesDelete
      summary: Delete an agent type
      tags:
        - Agents
      description: Deletes an agent type if no agents depend on it
      x-auth-permissions:
        - role: admin
          permission: all agent types
      responses:
        '204':
          description: Agent type deleted successfully
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: Administrator access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '404':
          description: Agent type not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '409':
          description: Cannot delete agent type with dependent agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /agents:
    get:
      operationId: agentsList
      summary: List agents
      tags:
        - Agents
      description: Retrieves a paginated list of agents
      x-auth-permissions:
        - role: admin
          permission: all agents
        - role: participant
          permission: agents belonging to its participant
        - role: agent
          permission: itself only
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          schema:
            type: string
          description: 'Sort field. Prefix with ''+'' for ascending or ''-'' for descending. Default is ascending. Supported fields: name'
          example: +name
        - name: name
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by agent name (can specify multiple values)
        - name: status
          in: query
          schema:
            type: array
            items:
              type: string
              enum:
                - New
                - Connected
                - Disconnected
                - Error
                - Disabled
          description: Filter by agent status (can specify multiple values)
        - name: providerId
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/properties.UUID'
          description: Filter by provider ID (can specify multiple values)
        - name: agentTypeId
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/properties.UUID'
          description: Filter by agent type ID (can specify multiple values)
      responses:
        '200':
          description: A paginated list of agents
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageRes'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/AgentRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: agentsCreate
      summary: Create an agent
      tags:
        - Agents
      description: Creates a new agent and returns the agent data with an authentication token
      x-auth-permissions:
        - role: admin
          permission: always
        - role: participant
          permission: for its participant (when acting as provider)
        - role: agent
          permission: not authorized
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentReq'
      responses:
        '201':
          description: Agent created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCreateRes'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /agents/me:
    get:
      operationId: agentsGetCurrent
      summary: Get current agent
      tags:
        - Agents
      description: Retrieves information about the currently authenticated agent
      security:
        - BearerAuth: []
      responses:
        '200':
          description: The agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRes'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /agents/me/status:
    put:
      operationId: agentsUpdateStatus
      summary: Update agent status
      tags:
        - Agents
      description: Updates the status of the authenticated agent
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  $ref: '#/components/schemas/AgentStatus'
      responses:
        '200':
          description: Agent status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRes'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /agents/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/properties.UUID'
    get:
      operationId: agentsGet
      summary: Get an agent
      tags:
        - Agents
      description: Retrieves a specific agent by ID
      x-auth-permissions:
        - role: admin
          permission: all agents
        - role: participant
          permission: agents belonging to its participant
        - role: agent
          permission: itself only
      responses:
        '200':
          description: The agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRes'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
    patch:
      operationId: agentsUpdate
      summary: Update an agent
      tags:
        - Agents
      description: Updates an existing agent
      x-auth-permissions:
        - role: admin
          permission: always
        - role: participant
          permission: agents belonging to its participant
        - role: agent
          permission: update its own status only
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentReq'
      responses:
        '200':
          description: Agent updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRes'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
    delete:
      operationId: agentsDelete
      summary: Delete an agent
      tags:
        - Agents
      description: Deletes an agent by ID
      x-auth-permissions:
        - role: admin
          permission: always
        - role: participant
          permission: agents belonging to its participant
        - role: agent
          permission: not authorized
      responses:
        '204':
          description: Agent deleted successfully
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /agent-pools:
    get:
      operationId: agentPoolsList
      summary: List agent pools
      tags:
        - Agents
      description: Retrieves a paginated list of agent pools
      x-auth-permissions:
        - role: admin
          permission: all agent pools
        - role: agent
          permission: all agent pools (read-only)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          schema:
            type: string
          description: 'Sort field. Prefix with ''+'' for ascending or ''-'' for descending. Default is ascending. Supported fields: name, type, createdAt'
          example: +name
        - name: name
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by name (case-insensitive substring match, can specify multiple values)
        - name: type
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by pool type (can specify multiple values)
        - name: generatorType
          in: query
          schema:
            type: array
            items:
              type: string
              enum:
                - list
          description: Filter by generator type (can specify multiple values)
      responses:
        '200':
          description: A paginated list of agent pools
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageRes'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/AgentPoolRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: agentPoolsCreate
      summary: Create an agent pool
      tags:
        - Agents
      description: Creates a new agent pool
      x-auth-permissions:
        - role: admin
          permission: always
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentPoolReq'
      responses:
        '201':
          description: Agent pool created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPoolRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /agent-pools/{id}:
    get:
      operationId: agentPoolsGet
      summary: Get an agent pool by ID
      tags:
        - Agents
      description: Retrieves details of a specific agent pool
      x-auth-permissions:
        - role: admin
          permission: always
        - role: agent
          permission: read-only
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/properties.UUID'
      responses:
        '200':
          description: Agent pool retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPoolRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Agent pool not found
    patch:
      operationId: agentPoolsUpdate
      summary: Update an agent pool
      tags:
        - Agents
      description: Updates an existing agent pool
      x-auth-permissions:
        - role: admin
          permission: always
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/properties.UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentPoolReq'
      responses:
        '200':
          description: Agent pool updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPoolRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Agent pool not found
    delete:
      operationId: agentPoolsDelete
      summary: Delete an agent pool
      tags:
        - Agents
      description: Deletes an existing agent pool
      x-auth-permissions:
        - role: admin
          permission: always
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/properties.UUID'
      responses:
        '204':
          description: Agent pool deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Agent pool not found
  /agent-pool-values:
    get:
      operationId: agentPoolValuesList
      summary: List agent pool values
      tags:
        - Agents
      description: Retrieves a paginated list of agent pool values
      x-auth-permissions:
        - role: admin
          permission: all agent pool values
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          schema:
            type: string
          description: 'Sort field. Prefix with ''+'' for ascending or ''-'' for descending. Default is ascending. Supported fields: name, createdAt'
          example: +name
        - name: name
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by name (case-insensitive substring match, can specify multiple values)
        - name: agentPoolId
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/properties.UUID'
          description: Filter by agent pool ID (can specify multiple values)
        - name: agentId
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/properties.UUID'
          description: Filter by agent ID (can specify multiple values)
      responses:
        '200':
          description: A paginated list of agent pool values
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageRes'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/AgentPoolValueRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: agentPoolValuesCreate
      summary: Create an agent pool value
      tags:
        - Agents
      description: Creates a new agent pool value
      x-auth-permissions:
        - role: admin
          permission: always
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentPoolValueReq'
      responses:
        '201':
          description: Agent pool value created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPoolValueRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /agent-pool-values/{id}:
    get:
      operationId: agentPoolValuesGet
      summary: Get an agent pool value by ID
      tags:
        - Agents
      description: Retrieves details of a specific agent pool value
      x-auth-permissions:
        - role: admin
          permission: always
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/properties.UUID'
      responses:
        '200':
          description: Agent pool value retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPoolValueRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Agent pool value not found
    delete:
      operationId: agentPoolValuesDelete
      summary: Delete an agent pool value
      tags:
        - Agents
      description: Deletes an existing agent pool value. Cannot delete a value that is currently allocated.
      x-auth-permissions:
        - role: admin
          permission: always
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/properties.UUID'
      responses:
        '204':
          description: Agent pool value deleted successfully
        '400':
          description: Cannot delete allocated pool value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Agent pool value not found
  /events:
    get:
      operationId: eventsList
      summary: List events
      tags:
        - Event
      description: Retrieves a paginated list of events
      x-auth-permissions:
        - role: admin
          permission: all events
        - role: participant
          permission: events related to its participant
        - role: agent
          permission: not authorized
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          schema:
            type: string
          description: 'Sort field. Prefix with ''+'' for ascending or ''-'' for descending. Default is ascending. Supported fields: createdAt, sequenceNumber'
          example: +createdAt
        - name: initiatorType
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by initiator type (can specify multiple values)
        - name: initiatorId
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/properties.UUID'
          description: Filter by initiator ID (can specify multiple values)
        - name: type
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by event type (can specify multiple values)
      responses:
        '200':
          description: A paginated list of events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageRes'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/EventRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /events/ack:
    post:
      operationId: eventsAck
      summary: Acknowledge processed events
      tags:
        - Event
      description: Acknowledge processed events and update progress (Option B - does not renew lease)
      x-auth-permissions:
        - role: admin
          permission: always
        - role: participant
          permission: not authorized
        - role: agent
          permission: not authorized
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventAckReq'
      responses:
        '200':
          description: Events acknowledged successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAckRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Acknowledgement conflict - lease not held or sequence regression
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /events/lease:
    post:
      operationId: eventsLease
      summary: Acquire event lease and fetch events
      tags:
        - Event
      description: Acquire or renew a lease for event processing and fetch events in chronological order
      x-auth-permissions:
        - role: admin
          permission: always
        - role: participant
          permission: not authorized
        - role: agent
          permission: not authorized
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventLeaseReq'
      responses:
        '200':
          description: Lease acquired successfully with events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventLeaseRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Lease conflict - held by another instance
          content:
