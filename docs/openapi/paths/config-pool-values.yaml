get:
  operationId: configPoolValuesList
  summary: List config pool values
  tags:
    - Agents
  description: Retrieves a paginated list of config pool values
  x-auth-permissions:
    - role: admin
      permission: all config pool values
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        default: 1
    - name: pageSize
      in: query
      schema:
        type: integer
        default: 10
    - name: sort
      in: query
      schema:
        type: string
      description: "Sort field. Prefix with '+' for ascending or '-' for descending. Default is ascending. Supported fields: name, createdAt"
      example: "+name"
    - name: name
      in: query
      schema:
        type: array
        items:
          type: string
      description: Filter by name (case-insensitive substring match, can specify multiple values)
    - name: configPoolId
      in: query
      schema:
        type: array
        items:
          $ref: "../components/schemas/common.yaml#/properties.UUID"
      description: Filter by config pool ID (can specify multiple values)
    - name: agentId
      in: query
      schema:
        type: array
        items:
          $ref: "../components/schemas/common.yaml#/properties.UUID"
      description: Filter by agent ID (can specify multiple values)
  responses:
    "200":
      description: A paginated list of config pool values
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/schemas/common.yaml#/PageRes"
              - type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "../components/schemas/config_pool_values.yaml#/ConfigPoolValueRes"
    "401":
      $ref: "../components/responses.yaml#/Unauthorized"
    "403":
      $ref: "../components/responses.yaml#/Forbidden"
post:
  operationId: configPoolValuesCreate
  summary: Create an config pool value
  tags:
    - Agents
  description: Creates a new config pool value
  x-auth-permissions:
    - role: admin
      permission: always
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/config_pool_values.yaml#/CreateConfigPoolValueReq"
  responses:
    "201":
      description: Config pool value created successfully
      content:
        application/json:
          schema:
            $ref: "../components/schemas/config_pool_values.yaml#/ConfigPoolValueRes"
    "400":
      $ref: "../components/responses.yaml#/BadRequest"
    "401":
      $ref: "../components/responses.yaml#/Unauthorized"
    "403":
      $ref: "../components/responses.yaml#/Forbidden"
