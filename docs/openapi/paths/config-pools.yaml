get:
  operationId: configPoolsList
  summary: List config pools
  tags:
    - Agents
  description: Retrieves a paginated list of config pools
  x-auth-permissions:
    - role: admin
      permission: all config pools
    - role: agent
      permission: all config pools (read-only)
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        default: 1
    - name: pageSize
      in: query
      schema:
        type: integer
        default: 10
    - name: sort
      in: query
      schema:
        type: string
      description: "Sort field. Prefix with '+' for ascending or '-' for descending. Default is ascending. Supported fields: name, type, createdAt"
      example: "+name"
    - name: name
      in: query
      schema:
        type: array
        items:
          type: string
      description: Filter by name (case-insensitive substring match, can specify multiple values)
    - name: type
      in: query
      schema:
        type: array
        items:
          type: string
      description: Filter by pool type (can specify multiple values)
    - name: generatorType
      in: query
      schema:
        type: array
        items:
          type: string
          enum: [list]
      description: Filter by generator type (can specify multiple values)
    - name: participantId
      in: query
      schema:
        type: array
        items:
          type: string
          format: uuid
      description: Filter by owning participant ID (can specify multiple values)
  responses:
    "200":
      description: A paginated list of config pools
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/schemas/common.yaml#/PageRes"
              - type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "../components/schemas/config_pools.yaml#/ConfigPoolRes"
    "401":
      $ref: "../components/responses.yaml#/Unauthorized"
    "403":
      $ref: "../components/responses.yaml#/Forbidden"
post:
  operationId: configPoolsCreate
  summary: Create a config pool
  tags:
    - Agents
  description: Creates a new config pool
  x-auth-permissions:
    - role: admin
      permission: always
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/config_pools.yaml#/CreateConfigPoolReq"
  responses:
    "201":
      description: Config pool created successfully
      content:
        application/json:
          schema:
            $ref: "../components/schemas/config_pools.yaml#/ConfigPoolRes"
    "400":
      $ref: "../components/responses.yaml#/BadRequest"
    "401":
      $ref: "../components/responses.yaml#/Unauthorized"
    "403":
      $ref: "../components/responses.yaml#/Forbidden"
