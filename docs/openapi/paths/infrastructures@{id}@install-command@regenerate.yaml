parameters:
  - name: id
    in: path
    required: true
    schema:
      $ref: "../components/schemas/common.yaml#/properties.UUID"
post:
  operationId: infrastructuresRegenerateInstallCommand
  summary: Regenerate install command
  tags:
    - Infrastructures
  description: |
    Rotates the infrastructure's install token. Invalidates any previously
    issued install token and returns a fresh install command plus fetch URL.
    As with Create, the plain token is rendered exactly once and cannot be
    recovered later.
  x-auth-permissions:
    - role: admin
      permission: always
    - role: participant
      permission: infrastructures provided by its participant
    - role: agent
      permission: not authorized
  responses:
    "200":
      description: Install token regenerated
      content:
        application/json:
          schema:
            $ref: "../components/schemas/install_tokens.yaml#/InstallTokenRes"
    "401":
      $ref: "../components/responses.yaml#/Unauthorized"
    "403":
      $ref: "../components/responses.yaml#/Forbidden"
    "404":
      description: Infrastructure not found
      content:
        application/json:
          schema:
            $ref: "../components/schemas/common.yaml#/ErrorRes"
