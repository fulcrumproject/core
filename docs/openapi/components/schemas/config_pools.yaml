CreateConfigPoolReq:
  type: object
  required:
    - name
    - type
    - propertyType
    - generatorType
  properties:
    name:
      type: string
      example: "Public IP Pool"
      description: "Name of the config pool"
    type:
      type: string
      example: "public_ip"
      description: "Type identifier for the pool"
    propertyType:
      type: string
      enum: [string, integer, number, boolean, json]
      example: "string"
      description: "Property type that this pool provides"
    generatorType:
      type: string
      enum: [list]
      example: "list"
      description: "Allocation strategy: 'list' for pre-configured values"
    generatorConfig:
      type: object
      description: "Generator-specific configuration"
      example: { "cidr": "192.168.1.0/24", "excludeFirst": 1, "excludeLast": 1 }
    participantId:
      $ref: "./common.yaml#/properties.UUID"
      description: |
        Owner of this pool. Omit (or set null) to create a global pool — admin only.
        When set, the pool is scoped to that participant; participants may only set
        their own ID. Two participants may have pools sharing the same `type`.

UpdateConfigPoolReq:
  type: object
  properties:
    name:
      type: string
      example: "Public IP Pool - Updated"
    generatorConfig:
      type: object
      description: "Generator-specific configuration"

ConfigPoolRes:
  type: object
  properties:
    id:
      $ref: "./common.yaml#/properties.UUID"
    name:
      type: string
      example: "Public IP Pool"
    type:
      type: string
      example: "public_ip"
    propertyType:
      type: string
      enum: [string, integer, number, boolean, json]
      example: "string"
      description: "Property type that this pool provides"
    generatorType:
      type: string
      enum: [list]
      example: "list"
    generatorConfig:
      type: object
      example: { "cidr": "192.168.1.0/24" }
    participantId:
      $ref: "./common.yaml#/properties.UUID"
      description: "Owning participant (null = global pool managed by admin)"
    participant:
      $ref: "./participants.yaml#/ParticipantRes"
      description: "Owning participant (omitted when this is a global pool)"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
