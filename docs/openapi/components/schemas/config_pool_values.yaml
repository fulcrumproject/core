CreateConfigPoolValueReq:
  type: object
  required:
    - configPoolId
    - name
    - value
  properties:
    configPoolId:
      $ref: "./common.yaml#/properties.UUID"
    name:
      type: string
      example: "192.168.1.10"
      description: "Display name for the value"
    value:
      description: "Any JSON value (string, number, object, array)"
      example: "192.168.1.10"

ConfigPoolValueRes:
  type: object
  properties:
    id:
      $ref: "./common.yaml#/properties.UUID"
    name:
      type: string
      example: "192.168.1.10"
    value:
      description: "Any JSON value (string, number, object, array)"
      example: "192.168.1.10"
    configPoolId:
      $ref: "./common.yaml#/properties.UUID"
    configPool:
      $ref: "./config_pools.yaml#/ConfigPoolRes"
      description: "The config pool this value belongs to"
    agentId:
      $ref: "./common.yaml#/properties.UUID"
      description: "Agent this value is allocated to (set only for agent-owned values)"
    agent:
      $ref: "./agents.yaml#/AgentRes"
      description: "The agent this value is allocated to (only present if allocated to an agent)"
    infrastructureId:
      $ref: "./common.yaml#/properties.UUID"
      description: "Infrastructure this value is allocated to (set only for infrastructure-owned values)"
    infrastructure:
      $ref: "./infrastructures.yaml#/InfrastructureRes"
      description: "The infrastructure this value is allocated to (only present if allocated to an infrastructure)"
    propertyName:
      type: string
      example: "ipAddress"
      description: "Property name this value is allocated to"
    allocatedAt:
      type: string
      format: date-time
      description: "When this value was allocated"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
