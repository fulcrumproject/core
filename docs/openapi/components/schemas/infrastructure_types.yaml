InfrastructureTypeRes:
  type: object
  properties:
    id:
      $ref: "./common.yaml#/properties.UUID"
    name:
      type: string
      example: "fulcrum-csp-node"
    configurationSchema:
      $ref: "./infrastructure_types.yaml#/InfrastructureConfigurationSchema"
      description: "Schema defining the structure and validation rules for infrastructure configuration"
    configTemplate:
      type: string
      description: "Go text/template rendered at install time to produce the infrastructure config file. Placeholder refs (e.g. {{.host}}) must be keys of configurationSchema.properties."
      example: "endpoint={{.endpoint}}\n"
    cmdTemplate:
      type: string
      description: "Go text/template rendered at install time to produce the infrastructure install command. Placeholder refs must be keys of configurationSchema.properties or the special {{.configUrl}} / {{.authToken}}."
      example: "curl -fsSL {{.configUrl}} -H 'Authorization: Bearer {{.authToken}}' | sh"
    configContentType:
      type: string
      description: "Media type (RFC 6838) of the rendered configTemplate output. Defaults to text/plain."
      default: "text/plain"
      example: "text/yaml"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

CreateInfrastructureTypeReq:
  type: object
  required:
    - name
    - configurationSchema
  properties:
    name:
      type: string
      description: Name of the infrastructure type
      example: "fulcrum-csp-node"
      minLength: 1
    configurationSchema:
      $ref: "./infrastructure_types.yaml#/InfrastructureConfigurationSchema"
      description: "Schema defining the structure and validation rules for infrastructure configuration"
    configTemplate:
      type: string
      description: "Go text/template for the infrastructure config file. Placeholder refs must be keys of configurationSchema.properties."
      example: "endpoint={{.endpoint}}\n"
    cmdTemplate:
      type: string
      description: "Go text/template for the infrastructure install command. Placeholder refs must be keys of configurationSchema.properties or {{.configUrl}} / {{.authToken}}."
      example: "curl -fsSL {{.configUrl}} -H 'Authorization: Bearer {{.authToken}}' | sh"
    configContentType:
      type: string
      description: "Media type (RFC 6838) of the rendered configTemplate output. Defaults to text/plain when omitted."
      default: "text/plain"
      example: "text/yaml"

UpdateInfrastructureTypeReq:
  type: object
  properties:
    name:
      type: string
      description: Updated name of the infrastructure type
      minLength: 1
    configurationSchema:
      $ref: "./infrastructure_types.yaml#/InfrastructureConfigurationSchema"
      description: "Updated configuration schema"
    configTemplate:
      type: string
      description: "Updated Go text/template for the infrastructure config file."
    cmdTemplate:
      type: string
      description: "Updated Go text/template for the infrastructure install command."
    configContentType:
      type: string
      description: "Updated media type for the rendered configTemplate output. Empty resets to text/plain."
      default: "text/plain"

InfrastructureConfigurationSchema:
  type: object
  description: Schema defining validation rules and structure for infrastructure configuration properties
  properties:
    properties:
      type: object
      description: Property definitions keyed by property name
      additionalProperties:
        $ref: "./service_types.yaml#/PropertyDefinition"
    validators:
      type: array
      description: Schema-level validators (e.g., exactlyOne)
      items:
        $ref: "./service_types.yaml#/SchemaValidatorConfig"
  example:
    properties:
      endpoint:
        type: "string"
        label: "Endpoint"
        required: true
