CreateAgentPoolValueReq:
  type: object
  required:
    - agentPoolId
    - name
    - value
  properties:
    agentPoolId:
      $ref: "./common.yaml#/properties.UUID"
    name:
      type: string
      example: "192.168.1.10"
      description: "Display name for the value"
    value:
      description: "Any JSON value (string, number, object, array)"
      example: "192.168.1.10"

AgentPoolValueRes:
  type: object
  properties:
    id:
      $ref: "./common.yaml#/properties.UUID"
    name:
      type: string
      example: "192.168.1.10"
    value:
      description: "Any JSON value (string, number, object, array)"
      example: "192.168.1.10"
    agentPoolId:
      $ref: "./common.yaml#/properties.UUID"
    agentPool:
      $ref: "./agent_pools.yaml#/AgentPoolRes"
      description: "The agent pool this value belongs to"
    agentId:
      $ref: "./common.yaml#/properties.UUID"
      description: "Agent this value is allocated to (null if available)"
    agent:
      $ref: "./agents.yaml#/AgentRes"
      description: "The agent this value is allocated to (only present if allocated)"
    propertyName:
      type: string
      example: "ipAddress"
      description: "Property name this value is allocated to"
    allocatedAt:
      type: string
      format: date-time
      description: "When this value was allocated"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
