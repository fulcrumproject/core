AgentStatus:
  type: string
  enum: [New, Connected, Disconnected, Error, Disabled]

CreateAgentReq:
  type: object
  required:
    - name
    - providerId
    - agentTypeId
  properties:
    name:
      type: string
      example: "aws-agent-01"
    providerId:
      $ref: "./common.yaml#/properties.UUID"
      description: "The participant ID that owns this agent"
    agentTypeId:
      $ref: "./common.yaml#/properties.UUID"
      description: "The agent type ID"
    tags:
      type: array
      items:
        type: string
      example: ["gpu", "high-memory", "ssd"]
      description: "Tags representing capabilities or certifications of this agent"
    configuration:
      $ref: "./common.yaml#/JSONObject"
      description: "Agent-specific configuration parameters"
      example:
        timeout: 30
        retries: 3
        environment: "production"
    servicePoolSetId:
      $ref: "./common.yaml#/properties.UUID"
      description: "Optional service pool set for automatic resource allocation"

UpdateAgentReq:
  type: object
  properties:
    name:
      type: string
      example: "aws-agent-01"
    status:
      $ref: "./agents.yaml#/AgentStatus"
    tags:
      type: array
      items:
        type: string
      example: ["gpu", "high-memory", "ssd"]
      description: "Tags representing capabilities or certifications of this agent"
    configuration:
      $ref: "./common.yaml#/JSONObject"
      description: "Agent-specific configuration parameters"
      example:
        timeout: 60
        retries: 5
        environment: "staging"
    servicePoolSetId:
      $ref: "./common.yaml#/properties.UUID"
      description: "Optional service pool set for automatic resource allocation"

AgentRes:
  type: object
  properties:
    id:
      $ref: "./common.yaml#/properties.UUID"
    name:
      type: string
      example: "aws-agent-01"
    status:
      $ref: "./agents.yaml#/AgentStatus"
    providerId:
      $ref: "./common.yaml#/properties.UUID"
    agentTypeId:
      $ref: "./common.yaml#/properties.UUID"
    tags:
      type: array
      items:
        type: string
      example: ["gpu", "high-memory", "ssd"]
    configuration:
      $ref: "./common.yaml#/JSONObject"
      description: "Agent-specific configuration parameters"
      example:
        timeout: 30
        retries: 3
        environment: "production"
    servicePoolSetId:
      $ref: "./common.yaml#/properties.UUID"
      description: "Optional service pool set for automatic resource allocation"
    participant:
      $ref: "./participants.yaml#/ParticipantRes"
    agentType:
      $ref: "./agent_types.yaml#/AgentTypeRes"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

AgentCreateRes:
  allOf:
    - $ref: "./agents.yaml#/AgentRes"
    - type: object
      properties:
        token:
          $ref: "./tokens.yaml#/TokenRes"
          description: "The agent authentication token"

InstallTokenRes:
  type: object
  description: |
    One-shot install token response. Returned by Create and Regenerate.
    `installCommand` and `url` contain the plain token; they cannot be
    recovered later — if lost, the token must be regenerated.
  properties:
    installCommand:
      type: string
      description: Rendered install command (copy-paste onto the target host).
      example: "agent install --config https://api.fulcrum.testudosrl.dev/api/v1/agents/install/tkn_9fUw8J3lA2bN5yQrK7zX/config"
    url:
      type: string
      format: uri
      description: Install fetch URL containing the plain token.
      example: "https://api.fulcrum.testudosrl.dev/api/v1/agents/install/tkn_9fUw8J3lA2bN5yQrK7zX/config"
    expiresAt:
      type: string
      format: date-time
      example: "2026-04-24T14:35:00Z"
  required: [installCommand, url, expiresAt]

InstallTokenMetaRes:
  type: object
  description: |
    Metadata-only view of the current install token. Never exposes the
    plain token or rendered URL.
  properties:
    id:
      $ref: "./common.yaml#/properties.UUID"
    expiresAt:
      type: string
      format: date-time
      example: "2026-04-24T14:35:00Z"
    createdAt:
      type: string
      format: date-time
      example: "2026-04-24T14:30:00Z"
  required: [id, expiresAt, createdAt]

