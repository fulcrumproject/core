services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - FULCRUM_DB_HOST=postgres
      - FULCRUM_DB_USER=fulcrum
      - FULCRUM_DB_PASSWORD=fulcrum_password
      - FULCRUM_DB_NAME=fulcrum_db
      - FULCRUM_DB_PORT=5432
      - FULCRUM_DB_SSL_MODE=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fulcrum-network

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=fulcrum
      - POSTGRES_PASSWORD=fulcrum_password
      - POSTGRES_DB=fulcrum_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup-metrics-schema.sql:/docker-entrypoint-initdb.d/01-setup-metrics-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fulcrum -d fulcrum_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fulcrum-network

volumes:
  postgres_data:

networks:
  fulcrum-network:
    driver: bridge
