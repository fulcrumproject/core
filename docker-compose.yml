services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      FULCRUM_DB_DSN: host=postgres user=${POSTGRES_USER:-fulcrum} password=${POSTGRES_PASSWORD:-fulcrum_password} dbname=${POSTGRES_DB:-fulcrum_db} port=5432 sslmode=disable
      FULCRUM_METRIC_DB_DSN: host=postgres user=${POSTGRES_USER:-fulcrum} password=${POSTGRES_PASSWORD:-fulcrum_password} dbname=${POSTGRES_DB:-fulcrum_db} port=5432 sslmode=disable
      FULCRUM_SCHEDULER_LOCKER_DB_DSN: host=postgres user=${POSTGRES_USER:-fulcrum} password=${POSTGRES_PASSWORD:-fulcrum_password} dbname=${POSTGRES_DB:-fulcrum_db} port=5432 sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      keycloak-provisioning:
        condition: service_completed_successfully
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - fulcrum-network

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=fulcrum
      - POSTGRES_PASSWORD=fulcrum_password
      - POSTGRES_DB=fulcrum_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fulcrum -d fulcrum_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fulcrum-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: info
    command: ["start-dev", "--http-port", "8080", "--https-port", "8443"]
    healthcheck:
      test:
        ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8080' || exit 1"]
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./test/keycloak/themes/fulcrum:/opt/keycloak/themes/fulcrum:z
      - ./test/keycloak/themes/fulcrum-admin:/opt/keycloak/themes/fulcrum-admin:z
    networks:
      - fulcrum-network

  keycloak-provisioning:
    image: quay.io/adorsys/keycloak-config-cli:latest
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: admin
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: "120s"
      IMPORT_FILES_LOCATION: "/config/*"
    volumes:
      - ./test/keycloak:/config:z
    networks:
      - fulcrum-network

volumes:
  postgres_data:

networks:
  fulcrum-network:
    driver: bridge
